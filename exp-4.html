<!DOCTYPE html>
<html>
<head>
    <title>Factorial of a Number</title>
</head>
<body>

    <h2>Factorial of a Number</h2>

    <script>
        let num = parseInt(prompt("Enter a number:"));
        let fact = 1;

        if (num < 0) {
            document.write("Factorial is not defined for negative numbers.");
        } else {
            for (let i = 1; i <= num; i++) {
                fact = fact * i;
            }
            document.write("Factorial of " + num + " is " + fact);
        }
    </script>

</body>
</html>
